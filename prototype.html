<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klassenchat – UI Prototype (FHNW)</title>
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const pref = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', pref);
    })();
  </script>
  <style>
    /* ── FHNW Design Tokens ── */
    :root {
      --fhnw-yellow:    #FDE70E;
      --fhnw-yellow-dk: #d4c000;
      --bg:          #f1f1ee;
      --surface:     #ffffff;
      --surface-own: #fdf9d0;
      --border:      #d8d8d5;
      --text:        #111111;
      --text-muted:  #666666;
      --text-sender: #7a6b00;
      --error-bg:    #fde8ed;
      --error-text:  #a01f3e;
      --error-border:#df305b;
      --shadow:      rgba(0,0,0,0.08);
    }
    [data-theme="dark"] {
      --bg:          #1a1a1a;
      --surface:     #2a2a2a;
      --surface-own: #2e2c10;
      --border:      #3a3a3a;
      --text:        #f1f1ee;
      --text-muted:  #999999;
      --text-sender: #c8b800;
      --error-bg:    #3a1520;
      --error-text:  #f07090;
      --error-border:#df305b;
      --shadow:      rgba(0,0,0,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      transition: background 0.2s, color 0.2s;
    }

    /* ── Header ── */
    header {
      background: var(--fhnw-yellow);
      color: #111111;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      min-height: 56px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .header-title { display: flex; align-items: center; gap: 10px; margin-right: auto; }
    .fhnw-mark {
      background: #111111;
      color: var(--fhnw-yellow);
      font-weight: 800;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      padding: 3px 6px;
      border-radius: 2px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #111111; }

    .username-area { display: flex; gap: 8px; align-items: center; }
    .username-area input {
      padding: 7px 11px;
      border: 2px solid rgba(0,0,0,0.25);
      border-radius: 3px;
      font-size: 0.875rem;
      background: rgba(255,255,255,0.6);
      color: #111111;
      outline: none;
      transition: border-color 0.15s;
    }
    .username-area input::placeholder { color: rgba(0,0,0,0.45); }
    .username-area input:focus { border-color: rgba(0,0,0,0.7); }

    .btn-secondary {
      padding: 7px 14px;
      background: #111111;
      color: var(--fhnw-yellow);
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 700;
    }
    .btn-secondary:hover { opacity: 0.82; }

    .theme-toggle {
      background: none;
      border: 2px solid rgba(0,0,0,0.35);
      border-radius: 3px;
      color: #111111;
      cursor: pointer;
      font-size: 1rem;
      padding: 5px 9px;
      line-height: 1;
    }
    .theme-toggle:hover { border-color: #111111; }

    #user-status {
      font-size: 0.8rem;
      color: rgba(0,0,0,0.65);
      width: 100%;
      padding: 4px 0 8px;
    }
    #user-status.anonymous { color: #7a3000; font-weight: 500; }

    /* ── Main ── */
    main { flex: 1; overflow-y: auto; padding: 16px; }

    #error-box {
      display: none;
      background: var(--error-bg);
      color: var(--error-text);
      border-left: 4px solid var(--error-border);
      padding: 10px 14px;
      border-radius: 3px;
      margin-bottom: 14px;
      font-size: 0.875rem;
    }

    #messages { display: flex; flex-direction: column; gap: 10px; }

    .message {
      background: var(--surface);
      border-radius: 4px;
      padding: 10px 14px;
      max-width: 72%;
      box-shadow: 0 1px 3px var(--shadow);
      align-self: flex-start;
      border: 1px solid var(--border);
      transition: background 0.2s;
    }
    .message.own {
      align-self: flex-end;
      background: var(--surface-own);
      border-left: 3px solid var(--fhnw-yellow);
    }

    .meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 0.78rem; }
    .sender { font-weight: 700; color: var(--text-sender); }
    .time   { color: var(--text-muted); }

    .delete-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.72rem;
      padding: 0;
    }
    .delete-btn:hover { color: #a01f3e; }

    .content { font-size: 0.925rem; color: var(--text); word-break: break-word; line-height: 1.5; }

    .empty-hint {
      color: var(--text-muted);
      text-align: center;
      margin-top: 48px;
      font-size: 0.925rem;
      border: 2px dashed var(--border);
      padding: 32px;
      border-radius: 4px;
    }

    /* ── Footer ── */
    footer {
      background: var(--surface);
      padding: 12px 16px;
      border-top: 3px solid var(--fhnw-yellow);
      transition: background 0.2s;
    }
    .send-area { display: flex; gap: 8px; }
    .send-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 0.925rem;
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.15s, background 0.2s;
    }
    .send-area input:focus { border-color: var(--fhnw-yellow-dk); }
    .send-area input::placeholder { color: var(--text-muted); }

    .btn-primary {
      padding: 10px 22px;
      background: var(--fhnw-yellow);
      color: #111111;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.925rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .btn-primary:hover { background: var(--fhnw-yellow-dk); }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <span class="fhnw-mark">FHNW</span>
    <h1>Klassenchat</h1>
  </div>

  <div class="username-area">
    <input type="text" id="username-input" placeholder="Dein Name" maxlength="50">
    <button class="btn-secondary" onclick="setUsername()">Name setzen</button>
  </div>

  <button class="theme-toggle" onclick="toggleTheme()" title="Dark Mode umschalten">&#9680;</button>

  <span id="user-status" class="anonymous">Kein Name gesetzt — du sendest als <strong>Anonym</strong></span>
</header>

<main>
  <div id="error-box"></div>
  <div id="messages">
    <p class="empty-hint">Noch keine Nachrichten — schreib die erste!</p>
  </div>
</main>

<footer>
  <div class="send-area">
    <input type="text" id="content-input" placeholder="Nachricht eingeben..."
           maxlength="500" autocomplete="off" onkeydown="handleEnter(event)">
    <button class="btn-primary" onclick="sendMessage()">Senden</button>
  </div>
</footer>

<script>
  let currentUser = null;
  let messages = [];

  function pad(n) { return String(n).padStart(2, '0'); }
  function nowUTC() {
    const d = new Date();
    return `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())}`;
  }

  function toggleTheme() {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  }

  function showError(msg) {
    const box = document.getElementById('error-box');
    box.textContent = msg;
    box.style.display = 'block';
    setTimeout(() => box.style.display = 'none', 4000);
  }

  function setUsername() {
    const name = document.getElementById('username-input').value.trim();
    if (!name) return;
    currentUser = name;
    const s = document.getElementById('user-status');
    s.classList.remove('anonymous');
    s.innerHTML = `Angemeldet als <strong>${escapeHtml(name)}</strong>`;
    render();
  }

  function sendMessage() {
    const input = document.getElementById('content-input');
    const content = input.value.trim();
    if (!content) { showError('Nachricht darf nicht leer sein.'); return; }
    if (content.length > 500) { showError(`Nachricht zu lang (${content.length}/500 Zeichen).`); return; }
    messages.push({
      id: crypto.randomUUID(),
      sender: currentUser || 'Anonym',
      content,
      sent_at: nowUTC(),
      is_anonym: !currentUser,
    });
    input.value = '';
    render();
    document.querySelector('main').scrollTop = document.querySelector('main').scrollHeight;
  }

  function deleteMessage(id) {
    messages = messages.filter(m => !(m.id === id && m.sender === currentUser));
    render();
  }

  function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const container = document.getElementById('messages');
    if (!messages.length) {
      container.innerHTML = '<p class="empty-hint">Noch keine Nachrichten — schreib die erste!</p>';
      return;
    }
    container.innerHTML = messages.map(m => {
      const isOwn = currentUser && m.sender === currentUser && !m.is_anonym;
      return `<div class="message ${isOwn ? 'own' : ''}">
        <div class="meta">
          <span class="sender">${escapeHtml(m.sender)}</span>
          <span class="time">${escapeHtml(m.sent_at)}</span>
          ${isOwn ? `<button class="delete-btn" onclick="deleteMessage('${m.id}')">Löschen</button>` : ''}
        </div>
        <div class="content">${escapeHtml(m.content)}</div>
      </div>`;
    }).join('');
  }
</script>
</body>
</html>
